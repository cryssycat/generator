<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Character Generator</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="background"></div>

<div class="container">
<header class="hero glass">
<h1>✨ Character Generator</h1>
<p>Build characters one piece at a time. Lock your favorite traits and reroll the rest.</p>
</header>

<nav class="generator-tabs glass">
<button class="generator-tab active" data-generator="character">✨ Character</button>
<button class="generator-tab" data-generator="fantasy">🧙 Fantasy</button>
<button class="generator-tab" data-generator="goth">🖤 Goth Girl</button>
<button class="generator-tab" data-generator="magicalGirl">🌙 Magical Girl</button>
<button class="generator-tab" data-generator="mlp">🦄 MLP Pony</button>
<button class="generator-tab" data-generator="pokemon">⚡ Pokémon</button>
<button class="generator-tab" data-generator="warrior">🐱 Warrior Cats</button>
<button class="generator-tab" data-generator="dragon"> 🐉 Dragon</button>
<button class="generator-tab" data-generator="familiar">🐾 Familiar</button>
<button class="generator-tab" data-generator="relationship">❤️ Relationship</button>
 <button class="generator-tab" data-generator="outfit">👗 Outfit</button>
 <button class="generator-tab" data-generator="weapon">⚔️ Weapon</button>
  
</nav>

<section class="toolbar glass">
<button id="generateBtn">🎲 Generate</button>
<button id="copyBtn">📋 Copy Character</button>
<button id="unlockAllBtn">🔓 Unlock All</button>
</section>

<section class="generator-title">
<h2 id="generatorName">Character Generator</h2>
</section>

<div id="generatorSections"></div>

<footer>Character Generator • StarHub Tools</footer>
</div>

<script src="data/character-data.js"></script>
<script src="data/fantasy-data.js"></script>
<script src="data/relationship-data.js"></script>
<script src="data/gothgirl-data.js"></script>
<script src="data/magicalgirl-data.js"></script>
<script src="data/mlp-data.js"></script>
<script src="data/pokemon-data.js"></script>
<script src="data/warriorcats-data.js"></script>
<script src="data/dragon-data.js"></script>
<script src="data/familiar-data.js"></script>
<script src="data/outfit-data.js"></script>
<script src="data/weapon-data.js"></script>

<script src="generators/character.js"></script>
<script src="generators/fantasy.js"></script>
<script src="generators/relationship.js"></script>
<script src="generators/gothgirl.js"></script>
<script src="generators/magicalgirl.js"></script>
<script src="generators/mlp.js"></script>
<script src="generators/pokemon.js"></script>
<script src="generators/warriorcats.js"></script>
<script src="generators/dragon.js"></script>
<script src="generators/familiar.js"></script>
<script src="generators/outfit.js"></script>
<script src="generators/weapon.js"></script>
  
<script src="script.js"></script>

</body>
</html>
