<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Character Generator</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="background"></div>

<div class="container">

    <!-- ===============================
         Hero
    ================================ -->

    <header class="hero glass">

        <h1>✨ Character Generator</h1>

        <p>

            Build characters one piece at a time.
            Lock your favorite traits and reroll the rest.

        </p>

    </header>



    <!-- ===============================
         Generator Tabs
    ================================ -->

    <nav class="generator-tabs glass">

        <button
            class="generator-tab active"
            data-generator="character">

            ✨ Character

        </button>

        <button
            class="generator-tab"
            data-generator="fantasy">

            🧙 Fantasy

        </button>

        <button
            class="generator-tab"
            data-generator="relationship">

            ❤️ Relationship

        </button>

        <button
            class="generator-tab"
            data-generator="pokemon">

            🐉 Pokémon

        </button>

        <button
            class="generator-tab"
            data-generator="familiar">

            🐾 Familiar

        </button>

        <button
            class="generator-tab"
            data-generator="hearthling">

            🏡 Hearthling

        </button>

        <button
            class="generator-tab"
            data-generator="warrior">

            ⚔️ Warrior

        </button>

        <button
            class="generator-tab"
            data-generator="magic">

            ✨ Magic

        </button>

        <button
            class="generator-tab"
            data-generator="outfit">

            👕 Outfit

        </button>

    </nav>



    <!-- ===============================
         Toolbar
    ================================ -->

    <section class="toolbar glass">

        <button id="generateBtn">

            🎲 Generate

        </button>

        <button id="copyBtn">

            📋 Copy Character

        </button>

        <button id="unlockAllBtn">

            🔓 Unlock All

        </button>

    </section>



    <!-- ===============================
         Generator Name
    ================================ -->

    <section class="generator-title">

        <h2 id="generatorName">

            Character Generator

        </h2>

    </section>



    <!-- ===============================
         Appearance
    ================================ -->

    <section class="group glass">

        <h3>

            🦊 Appearance

        </h3>

        <div
            id="appearanceGroup"
            class="field-list">

        </div>

    </section>



    <!-- ===============================
         Personality
    ================================ -->

    <section class="group glass">

        <h3>

            😊 Personality

        </h3>

        <div
            id="personalityGroup"
            class="field-list">

        </div>

    </section>



    <!-- ===============================
         Lore
    ================================ -->

    <section class="group glass">

        <h3>

            📖 Lore

        </h3>

        <div
            id="loreGroup"
            class="field-list">

        </div>

    </section>



    <!-- ===============================
         Footer
    ================================ -->

    <footer>

        Character Generator
        •
        StarHub Tools

    </footer>

</div>



<!-- ===============================
     Data Files
================================ -->

<script src="data/character-data.js"></script>

<!-- Future -->

<script src="data/fantasy-data.js"></script>
<script src="data/relationship-data.js"></script>
<script src="data/pokemon-data.js"></script>



<!-- ===============================
     Generator Definitions
================================ -->

<script src="generators/character.js"></script>

<!-- Future -->

<script src="generators/fantasy.js"></script>
<script src="generators/relationship.js"></script>
<script src="generators/pokemon.js"></script>



<!-- ===============================
     Engine
================================ -->

<script src="script.js"></script>

</body>
</html>
