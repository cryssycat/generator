<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Character Generator</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="background"></div>

<div class="container">
<div class="tabs">

    <button class="tab active" data-generator="character">
        Character
    </button>

    <button class="tab" data-generator="fantasy">
        Fantasy
    </button>

    <button class="tab" data-generator="relationship">
        Relationship
    </button>

    <button class="tab" data-generator="pokemon">
        Pokémon
    </button>

</div>
    
    
    <header class="hero glass">

        <h1>✨ Character Generator</h1>

        <p>
            Build a character one piece at a time.
            Lock the parts you love and reroll the rest.
        </p>

        <div class="hero-buttons">

            <button id="generateBtn">
                🎲 Generate Character
            </button>

            <button id="copyBtn">
                📋 Copy
            </button>

           </div>

    </header>



    <main>

        <!-- Appearance -->

        <section class="group glass">

            <h2>🦊 Appearance</h2>

            <div
                id="appearanceGroup"
                class="field-list">
            </div>

        </section>



        <!-- Personality -->

        <section class="group glass">

            <h2>😊 Personality</h2>

            <div
                id="personalityGroup"
                class="field-list">
            </div>

        </section>



        <!-- Lore -->

        <section class="group glass">

            <h2>📖 Lore</h2>

            <div
                id="loreGroup"
                class="field-list">
            </div>

        </section>

    </main>



    <footer>

        Character Generator v1

    </footer>

</div>



<!-- Hidden Import -->

<input
    type="file"
    id="importFile"
    accept=".json"
    hidden>



<script src="data.js"></script>
<script src="script.js"></script>

</body>
</html>
