<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Character Generator</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="background"></div>

<div class="container">

    <!-- ===============================
         Hero
    ================================ -->

    <header class="hero glass">

        <h1>✨ Character Generator</h1>

        <p>

            Build characters one piece at a time.
            Lock your favorite traits and reroll the rest.

        </p>

    </header>



    <!-- ===============================
         Generator Tabs
    ================================ -->

    <nav class="generator-tabs glass">

        <button
            class="generator-tab active"
            data-generator="character">

            ✨ Character

        </button>

     

    </nav>



    <!-- ===============================
         Toolbar
    ================================ -->

    <section class="toolbar glass">

        <button id="generateBtn">

            🎲 Generate

        </button>

        <button id="copyBtn">

            📋 Copy Character

        </button>

        <button id="unlockAllBtn">

            🔓 Unlock All

        </button>

    </section>



    <!-- ===============================
         Generator Name
    ================================ -->

    <section class="generator-title">

        <h2 id="generatorName">

            Character Generator

        </h2>

    </section>



    <!-- Generator Sections -->
<div id="generatorSections"></div>



    <!-- ===============================
         Footer
    ================================ -->

    <footer>

        Character Generator
        •
        StarHub Tools

    </footer>

</div>



<!-- ===============================
     Data Files
================================ -->

<script src="data/character-data.js"></script>


<!-- ===============================
     Generator Definitions
================================ -->

<script src="generators/character.js"></script>


<!-- ===============================
     Engine
================================ -->

<script src="script.js"></script>

</body>
</html>
